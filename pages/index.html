<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGDisplay — Settings</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f0f0;--surface:#fff;--border:rgba(0,0,0,0.09);--border-mid:rgba(0,0,0,0.15);
  --text:#1a1a1a;--muted:#666;--faint:#999;
  --accent:#E24B4A;--accent-bg:#fff5f5;
  --green:#16a34a;--green-bg:#dcfce7;
  --amber:#92400e;--amber-bg:#fef3c7;
  --red:#b91c1c;--red-bg:#fee2e2;
  --blue:#1d4ed8;--blue-bg:#dbeafe;
  --r:8px;--rl:12px;--mono:'Courier New',monospace;
}
body{font-family:'Trebuchet MS','Segoe UI',Verdana,sans-serif;background:radial-gradient(1200px 700px at 20% -20%,rgba(255,107,106,.12),transparent 55%),radial-gradient(900px 500px at 100% 0,rgba(96,165,250,.12),transparent 45%),var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* ── Header ── */
.header{background:color-mix(in srgb,var(--surface) 82%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 1.5rem}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:12px;height:62px}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,#ff8f70,#e24b4a 65%);box-shadow:0 8px 18px rgba(226,75,74,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px;fill:white}
.header h1{font-size:16px;font-weight:700;letter-spacing:.01em}
.header p{font-size:12px;color:var(--muted)}
.status-pill{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 11px;border-radius:99px;white-space:nowrap;flex-shrink:0;border:1px solid transparent}
.status-pill.online{color:var(--green);background:var(--green-bg)}
.status-pill.offline{color:var(--red);background:var(--red-bg)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.save-bar{margin-left:12px}
.save-btn{padding:8px 18px;background:linear-gradient(145deg,#ff8578,#e24b4a 70%);color:white;border:1px solid rgba(255,255,255,.2);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s,filter .15s}
.save-btn:hover{transform:translateY(-1px);filter:brightness(1.05)}

/* ── Layout ── */
.page{max-width:1280px;margin:0 auto;padding:1.25rem 1.5rem 2rem}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1.15rem;align-items:start}
.grid.full{grid-template-columns:1fr}
@media(max-width:720px){.grid{grid-template-columns:1fr}}

/* ── Section ── */
.section{background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 92%,#fff 8%),var(--surface));border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.08)}
.section-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:background .15s}
.section-head:hover{background:#fafafa}
.section-head.open{border-bottom-color:var(--border)}
.section-icon{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-icon svg{width:14px;height:14px}
.section-title{font-size:13px;font-weight:700;flex:1}
.section-sub{font-size:11px;color:var(--muted);margin-top:1px}
.chevron{width:16px;height:16px;color:var(--faint);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.section-body{display:none}
.section-body.open{display:block}

/* ── Field ── */
.field{padding:11px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.field:last-child{border-bottom:none}
.field-label{flex:1;min-width:0}
.field-label .name{font-size:13px;font-weight:600}
.field-label .desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35}
.subfield{padding:8px 16px 8px 28px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:#fafafa}
.subfield:last-child{border-bottom:none}
.subfield .field-label .name{font-size:12px;font-weight:400;color:var(--muted)}

/* ── Inputs ── */
input[type=text],input[type=password],input[type=url],input[type=number],select{
  font-size:13px;padding:7px 10px;border-radius:10px;border:1px solid var(--border-mid);
  background:#fafafa;color:var(--text);outline:none;transition:border .15s,box-shadow .15s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(226,75,74,.1)}
input[type=number]{width:80px}
select{min-width:120px}
.wide{width:210px}
input[type=text].wide,input[type=password].wide,input[type=url].wide{width:210px}

/* ── Toggle ── */
.toggle{position:relative;width:38px;height:21px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.track{position:absolute;inset:0;background:#d1d5db;border-radius:99px;cursor:pointer;transition:background .2s}
.track::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle input:checked+.track{background:var(--accent)}
.toggle input:checked+.track::before{transform:translateX(17px)}

/* ── Radio ── */
.radio-group{display:flex;gap:6px;flex-wrap:wrap}
.radio-opt{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:4px 9px;border-radius:var(--r);border:1px solid var(--border-mid);background:#fafafa;transition:all .15s}
.radio-opt:has(input:checked){border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.radio-opt input{accent-color:var(--accent)}

/* ── Badges ── */
.badge{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:600;white-space:nowrap}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.blue{background:var(--blue-bg);color:var(--blue)}

/* ── Buttons ── */
.btn{font-size:12px;padding:6px 12px;border-radius:10px;border:1px solid var(--border-mid);background:white;color:var(--text);cursor:pointer;transition:background .15s,transform .15s;white-space:nowrap}
.btn:hover{background:#f5f5f5;transform:translateY(-1px)}
.btn.danger{color:var(--red);border-color:#fca5a5}
.btn.danger:hover{background:var(--red-bg)}
.btn.full{width:100%;padding:9px;margin-top:6px;text-align:center}

/* ── Key display ── */
.key-display{font-family:var(--mono);font-size:11px;background:#f1f5f9;padding:3px 8px;border-radius:var(--r);color:var(--muted);border:1px solid var(--border)}

/* ── Rotate ring ── */
.rotate-block{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.rotate-meta{font-size:11px;color:var(--muted);text-align:right}

/* ── Diag rows ── */
.diag-row{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;font-size:12px;border-bottom:1px solid var(--border)}
.diag-row:last-child{border-bottom:none}

/* ── Version rows ── */
.vrow{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border)}
.vrow:last-child{border-bottom:none}
.vrow .label{color:var(--text)}

/* ── Log ── */
.log-row{display:flex;justify-content:space-between;padding:4px 16px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}
.log-row:last-child{border-bottom:none}

/* ── Threshold row ── */
.thr-row{display:flex;align-items:center;gap:6px}
.thr-row input{width:68px}
.thr-row span{font-size:11px;color:var(--muted)}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:9px 18px;border-radius:var(--rl);font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ── Time range ── */
.time-range{display:flex;align-items:center;gap:6px}
.time-range select{width:90px}
.time-range span{font-size:12px;color:var(--muted)}

/* ── Section icon colors ── */
.icon-wifi{background:#dbeafe}.icon-wifi svg{stroke:#1d4ed8;fill:none}
.icon-dex{background:#fce7f3}.icon-dex svg{fill:#be185d}
.icon-alert{background:#fef3c7}.icon-alert svg{stroke:#92400e;fill:none}
.icon-display{background:#f3e8ff}.icon-display svg{stroke:#7c3aed;fill:none}
.icon-security{background:#fee2e2}.icon-security svg{stroke:#b91c1c;fill:none}
.icon-backup{background:#dcfce7}.icon-backup svg{stroke:#16a34a;fill:none}
.icon-diag{background:#e0f2fe}.icon-diag svg{stroke:#0369a1;fill:none}
.icon-system{background:#f1f5f9}.icon-system svg{stroke:#475569;fill:none}

[data-theme="dark"]{
  --bg:#090a0c;--surface:#14161b;--border:rgba(255,255,255,0.09);--border-mid:rgba(255,255,255,0.18);
  --text:#f4f6fb;--muted:#9aa0ad;--faint:#626776;
  --accent:#ff6b6a;--accent-bg:#2d1515;
  --green:#4ade80;--green-bg:#052e16;
  --amber:#fbbf24;--amber-bg:#1c1105;
  --red:#f87171;--red-bg:#2d0a0a;
  --blue:#60a5fa;--blue-bg:#0c1a2e;
}
[data-theme="dark"] .section{box-shadow:0 10px 26px rgba(0,0,0,.32)}
[data-theme="dark"] .section-head:hover{background:#1b1e25}
[data-theme="dark"] .subfield{background:#111319}
[data-theme="dark"] input,
[data-theme="dark"] select{background:#21242d;border-color:rgba(255,255,255,0.16);color:#f4f6fb}
[data-theme="dark"] .radio-opt{background:#21242d;border-color:rgba(255,255,255,0.14)}
[data-theme="dark"] .radio-opt:has(input:checked){background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
[data-theme="dark"] .btn{background:#21242d;border-color:rgba(255,255,255,0.18);color:#f4f6fb}
[data-theme="dark"] .btn:hover{background:#2b3040}
[data-theme="dark"] .key-display{background:#21242d;border-color:rgba(255,255,255,0.12);color:#a2a9b8}
[data-theme="dark"] .header{background:color-mix(in srgb,#11131a 84%,transparent);border-color:rgba(255,255,255,0.1)}
[data-theme="dark"] .icon-wifi{background:#0c1a2e}
[data-theme="dark"] .icon-dex{background:#2d0a1e}
[data-theme="dark"] .icon-alert{background:#1c1105}
[data-theme="dark"] .icon-display{background:#1a0d2e}
[data-theme="dark"] .icon-security{background:#2d0a0a}
[data-theme="dark"] .icon-backup{background:#052e16}
[data-theme="dark"] .icon-diag{background:#0c1a2e}
[data-theme="dark"] .icon-system{background:#1a1a1a}
[data-theme="dark"] .log-row{border-color:rgba(255,255,255,0.06)}
[data-theme="dark"] #app > div > div{border-color:rgba(255,255,255,0.08)}
.theme-btn{background:none;border:1px solid var(--border-mid);border-radius:var(--r);padding:5px 10px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;margin-right:4px}
.theme-btn:hover{background:var(--border);color:var(--text)}

</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 5-7 13-7 13S5 14 5 9a7 7 0 017-7zm0 4a3 3 0 100 6 3 3 0 000-6z"/></svg></div>
    <div><h1>BGDisplay</h1></div>
    <div id="statusPill" class="status-pill offline"><span class="dot"></span>Loading...</div>
    <div class="save-bar"><button class="save-btn" onclick="saveConfig()">Save changes</button></div>
  </div>
</div>

<div class="page" id="app"><p style="color:var(--muted);padding:2rem;text-align:center">Loading...</p></div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = "https://bgdisplay-worker.zanebaize.workers.dev";
let CONFIG = {}, META = {}, METRICS = null;
let ADMIN_SESSION = "";
let LOGS = { meta: null, preview: [], total: 0 };
let MAINT = null;

// ── API ──────────────────────────────────────────────────────────────────────
async function apiGet(p){
  const headers={};
  if(ADMIN_SESSION) headers['X-Admin-Session']=ADMIN_SESSION;
  const r=await fetch(WORKER_URL+p,{headers});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiPost(p,d){
  const headers={'Content-Type':'application/json'};
  if(ADMIN_SESSION) headers['X-Admin-Session']=ADMIN_SESSION;
  const r=await fetch(WORKER_URL+p,{method:'POST',headers,body:JSON.stringify(d)});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

async function ensureSession(){
  if(ADMIN_SESSION) return;
  const r=await fetch(WORKER_URL+'/api/admin/session');
  if(!r.ok) throw new Error('session');
  const data=await r.json();
  ADMIN_SESSION=data.token||'';
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg,ms=2500){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),ms); }

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtTs(ts){ if(!ts) return '—'; const d=new Date(ts),now=new Date(),diff=Date.now()-ts; if(diff<60000) return 'Just now'; if(diff<3600000) return Math.floor(diff/60000)+' min ago'; if(d.toDateString()===now.toDateString()) return 'Today '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit',hour12:true}); return d.toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }
function fmtCountdown(ms){ if(ms<=0) return 'Overdue'; const d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000); return d>0?`${d}d ${h}h remaining`:`${h}h remaining`; }
function rotateProgress(lastRotated){ const total=7*86400000,elapsed=Date.now()-(lastRotated||0),pct=Math.min(elapsed/total,1),r=15,circ=2*Math.PI*r,used=circ*pct,remain=circ-used,label=Math.max(0,7-Math.floor(elapsed/86400000))+'d',color=pct>0.85?'#E24B4A':pct>0.6?'#f59e0b':'#16a34a'; return{used,remain,label,color}; }
function fmtUptime(s){ if(!s) return '—'; return `${Math.floor(s/86400)}d ${Math.floor((s%86400)/3600)}h`; }
function to12h(hhmm){ const m=String(hhmm||'').trim().match(/^([01]?\d|2[0-3]):([0-5]\d)$/); if(!m) return hhmm||''; let h=parseInt(m[1],10); const min=m[2]; const ap=h>=12?'PM':'AM'; h=h%12; if(h===0) h=12; return `${h}:${min} ${ap}`; }
function to24h(v,fallback='23:00'){ const s=String(v||'').trim(); const m12=s.match(/^(1[0-2]|0?[1-9]):([0-5]\d)\s*([AaPp][Mm])$/); if(m12){ let h=parseInt(m12[1],10)%12; if(m12[3].toUpperCase()==='PM') h+=12; return `${String(h).padStart(2,'0')}:${m12[2]}`; } const m24=s.match(/^([01]?\d|2[0-3]):([0-5]\d)$/); if(m24) return `${String(parseInt(m24[1],10)).padStart(2,'0')}:${m24[2]}`; return fallback; }

// ── Collect Config ────────────────────────────────────────────────────────────
function get(id){ const el=document.getElementById(id); if(!el) return undefined; if(el.type==='checkbox') return el.checked; if(el.type==='number') return parseFloat(el.value); return el.value; }
function radio(name){ const el=document.querySelector(`input[name="${name}"]:checked`); return el?el.value:undefined; }

function collectConfig(){
  const c={};
  const fields=['wifi_ssid','wifi_pass','nightscout_url','nightscout_secret','dexcom_user','dexcom_pass','dexcom_region',
    'poll_interval_min','stale_data_warn_min','config_ping_min',
    'bg_units','urgent_low','low','high','urgent_high',
    'show_last_reading_time','show_trend_arrow','brightness',
    'dnd_enabled','dnd_from','dnd_to','clock_24hr','timezone',
    'rate_limit_per_min','lockout_enabled','lockout_attempts','lockout_duration_min',
    'session_timeout_min','ip_allowlist_enabled','auto_backup',
    'alert_offline_min','alert_stale_min','alert_battery_low_pct','alert_cooldown_min'];
  fields.forEach(f=>{ const v=get(f); if(v!==undefined&&v!=='') c[f]=v; });
  const bgAlert=radio('bg_alert_style'); if(bgAlert) c.bg_alert_style=bgAlert;

  const days=['sun','mon','tue','wed','thu','fri','sat'];
  const dndSchedule={};
  days.forEach(day=>{
    const from=to24h(get(`dnd_${day}_from`)||'11:00 PM','23:00');
    const to=to24h(get(`dnd_${day}_to`)||'6:00 AM','06:00');
    dndSchedule[day]={from,to};
  });
  c.dnd_use_schedule=true;
  c.dnd_schedule=dndSchedule;
  c.dnd_from=dndSchedule.sun.from;
  c.dnd_to=dndSchedule.sun.to;

  if(get('wifi_pass')==='') delete c.wifi_pass;
  if(get('dexcom_pass')==='') delete c.dexcom_pass;
  return c;
}

// ── Actions ──────────────────────────────────────────────────────────────────
async function saveConfig(){
  const btn=document.querySelector('.save-btn');
  if(btn){ btn.textContent='Saving...'; btn.disabled=true; }
  try{
    const updates=collectConfig();
    await apiPost('/api/admin/config',updates);
    CONFIG={...CONFIG,...updates};
    toast('✓ Saved. Reboot device to apply now (or wait for 3AM auto reboot).', 4500);
    await loadConfig();
    await loadMetrics();
    render();
  }catch(e){
    toast('❌ Error saving — check Worker');
  } finally {
    if(btn){ btn.textContent='Save changes'; btn.disabled=false; }
  }
}

async function clearLog(){
  try{ await apiPost('/api/admin/clear-log',{}); META.changelog=[]; render(); toast('✓ Log cleared'); }
  catch(e){ toast('Error'); }
}

function exportConfig(){ window.open(WORKER_URL+'/api/admin/export','_blank'); }

function importConfig(){
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=async e=>{
    try{ const text=await e.target.files[0].text(); const data=JSON.parse(text); await apiPost('/api/admin/import',data); toast('✓ Config imported'); await loadConfig(); render(); }
    catch(err){ toast('Import failed'); }
  }; input.click();
}

async function runDiagnostics(){
  document.getElementById('diag-dex').innerHTML='<span class="badge blue">Testing...</span>';
  document.getElementById('diag-worker').innerHTML='<span class="badge blue">Testing...</span>';
  const t0=Date.now();
  try{ await apiGet('/api/admin/config'); document.getElementById('diag-latency').textContent=`${Date.now()-t0}ms`; document.getElementById('diag-worker').innerHTML='<span class="badge green">OK</span>'; }
  catch(e){ document.getElementById('diag-worker').innerHTML='<span class="badge red">Error</span>'; }
  document.getElementById('diag-dex').innerHTML=CONFIG.dexcom_user?'<span class="badge green">Configured</span>':'<span class="badge amber">Not configured</span>';
}

async function sendCommand(type){
  try{
    await apiPost('/api/admin/command',{type});
    const msg = type==='reboot'
      ? '✓ Reboot command queued'
      : (type==='upload-logs' ? '✓ Pull SD logs command queued' : '✓ Sync-now command queued');
    toast(msg);
    await loadConfig();
    await loadMetrics();
    render();
  }catch(e){
    toast('❌ Failed to queue command');
  }
}

async function downloadLatestLogs(){
  await ensureSession();
  const q = new URLSearchParams({ download: '1', session: ADMIN_SESSION || '' });
  window.open(WORKER_URL + '/api/admin/logs/latest?' + q.toString(), '_blank');
}

async function loadLogs(){
  const q = encodeURIComponent(document.getElementById('log_q')?.value || '');
  const lvl = encodeURIComponent(document.getElementById('log_lvl')?.value || '');
  try{
    LOGS = await apiGet(`/api/admin/logs/latest?limit=120&q=${q}&lvl=${lvl}`);
    render();
  }catch(e){
    toast('Log query failed');
  }
}

async function loadMaintenance(){
  try{ MAINT = await apiGet('/api/admin/maintenance'); }
  catch(e){ MAINT = null; }
}

// ── Collapsible sections ──────────────────────────────────────────────────────
function toggleSection(id){
  const body=document.getElementById('body-'+id);
  const head=document.getElementById('head-'+id);
  const chev=document.getElementById('chev-'+id);
  const open=body.classList.toggle('open');
  head.classList.toggle('open',open);
  chev.classList.toggle('open',open);
  localStorage.setItem('section-'+id, open?'1':'0');
}

function sectionOpen(id){ return localStorage.getItem('section-'+id)!=='0'; }

function section(id,iconClass,iconSvg,title,sub,content,fullWidth=false){
  const open=sectionOpen(id);
  return `<div class="section${fullWidth?' full':''}">
    <div class="section-head${open?' open':''}" id="head-${id}" onclick="toggleSection('${id}')">
      <div class="section-icon ${iconClass}">${iconSvg}</div>
      <div style="flex:1"><div class="section-title">${title}</div>${sub?`<div class="section-sub">${sub}</div>`:''}
      </div>
      <svg class="chevron${open?' open':''}" id="chev-${id}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="section-body${open?' open':''}" id="body-${id}">${content}</div>
  </div>`;
}

function field(label,desc,control){
  return `<div class="field"><div class="field-label"><div class="name">${label}</div>${desc?`<div class="desc">${desc}</div>`:''}</div>${control}</div>`;
}

function subfield(label,control){
  return `<div class="subfield"><div class="field-label"><div class="name">${label}</div></div>${control}</div>`;
}

function sel(id,options,val){
  return `<select id="${id}">${options.map(([v,l])=>`<option value="${v}"${val==v?' selected':''}>${l}</option>`).join('')}</select>`;
}

function tog(id,val){
  return `<label class="toggle"><input type="checkbox" id="${id}"${val?' checked':''}><span class="track"></span></label>`;
}

function inp(id,type,val,ph,cls='wide'){
  return `<input type="${type}" id="${id}" class="${cls}" value="${val||''}" placeholder="${ph||''}">`;
}

function badge(text,cls){ return `<span class="badge ${cls}">${text}</span>`; }

async function loadMetrics(){
  try{
    const data=await apiGet('/api/admin/metrics');
    METRICS=data||null;
  }catch(e){
    METRICS=null;
  }
}

async function loadConfig(){
  const data=await apiGet('/api/admin/config');
  CONFIG=data.config||{};
  META={
    status:data.status,changelog:data.changelog,
    failedAuthCount:data.failedAuthCount,lastRotated:data.lastRotated,
    nextAutoRotate:data.nextAutoRotate,keyTail:data.keyTail,
    pendingRotation:data.pendingRotation,config_version:data.config_version,
    pendingCommand:data.pendingCommand,lastCommandAck:data.lastCommandAck,
    lastLogUpload:data.lastLogUpload,
    reminders:data.reminders||[],
    secretMeta:data.secretMeta||{},
  };
}

async function init(){
  try{
    await ensureSession();
    await loadConfig();
    await loadMetrics();
    await loadMaintenance();
    render();
  }catch(e){
    document.getElementById('app').innerHTML=`<div style="text-align:center;padding:3rem;color:var(--red)">Could not reach Worker at <code>${WORKER_URL}</code><br><small style="color:var(--muted);margin-top:8px;display:block">Check that wrangler is deployed and the URL is correct.</small></div>`;
  }
}
init();
</script>
</body>
</html>
