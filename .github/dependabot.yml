version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/apps/cloudflare"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      cloudflare-npm:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/apps/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      ui-npm:
        patterns:
          - "*"
