name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  publish:
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF_SHA: ${{ github.sha }}
        run: |
          gh api "repos/${REPO}/contents/.github/release-template.md?ref=${REF_SHA}" --jq .content | base64 --decode > release-template.md

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes-file release-template.md
