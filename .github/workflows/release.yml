name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install worker dependencies
        working-directory: apps/cloudflare
        run: npm ci

      - name: Validate worker syntax
        run: node --check apps/cloudflare/src/worker.js

      - name: Build UI
        working-directory: apps/ui
        run: npm ci; npm run build

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-template.md << 'EOF'
          ## Release Checklist

          - [ ] docs/release-checklist.md reviewed and completed
          - [ ] Firmware / worker / UI validation completed for changed surfaces
          - [ ] OTA impact reviewed and docs/cloudflare-ota-prep.md updated (if applicable)
          - [ ] Rollback approach confirmed

          ## Highlights

          - 

          ## Operational Notes

          - 

          ## Follow-ups

          - 
          EOF

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes-file release-template.md
