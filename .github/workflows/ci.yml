name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  secret-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run secret literal guard
        shell: pwsh
        run: ./scripts/security/secret_guard.ps1

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: 'pip install --only-binary :all: platformio==6.1.19'

      - name: Build firmware
        run: pio run

  worker-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/cloudflare
        run: npm ci --ignore-scripts

      - name: Validate worker syntax
        run: node --check apps/cloudflare/src/worker.js

      - name: Run worker unit tests
        working-directory: apps/cloudflare
        run: npm test

  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "20"

      - name: Install cloudflare dependencies
        working-directory: apps/cloudflare
        run: npm ci --ignore-scripts

      - name: Check cloudflare formatting
        working-directory: apps/cloudflare
        run: npm run format:check

      - name: Install ui dependencies
        working-directory: apps/ui
        run: npm ci --ignore-scripts

      - name: Check ui formatting
        working-directory: apps/ui
        run: npm run format:check

  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}