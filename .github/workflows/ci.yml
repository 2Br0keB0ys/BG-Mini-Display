name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  secret-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run secret literal guard
        shell: pwsh
        run: ./scripts/security/secret_guard.ps1

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

  worker-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/cloudflare
        run: npm ci

      - name: Validate worker syntax
        run: node --check apps/cloudflare/src/worker.js

      - name: Run worker unit tests
        working-directory: apps/cloudflare
        run: npm test

  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"

      - name: Install cloudflare dependencies
        working-directory: apps/cloudflare
        run: npm ci

      - name: Check cloudflare formatting
        working-directory: apps/cloudflare
        run: npm run format:check

      - name: Install ui dependencies
        working-directory: apps/ui
        run: npm ci

      - name: Check ui formatting
        working-directory: apps/ui
        run: npm run format:check