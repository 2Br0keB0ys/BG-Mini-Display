name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -d firmware/bgdisplay

  worker-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/cloudflare
        run: npm ci

      - name: Validate worker syntax
        run: node --check apps/cloudflare/src/worker.js