name: Bug report
description: Report a reproducible defect in firmware, worker, or UI
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - firmware
        - worker
        - ui
        - docs
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. firmware 4.1.1, commit abc123
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Device model, OS, browser, region, network details (as relevant)
