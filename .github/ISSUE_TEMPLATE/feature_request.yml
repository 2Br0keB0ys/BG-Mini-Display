name: Feature request
description: Propose a practical improvement
labels: [enhancement]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - firmware
        - worker
        - ui
        - docs
        - operations
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe expected behavior and scope.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: Must avoid additional paid services/tools
        - label: Must preserve existing auth/signing security behavior
        - label: Must keep production docs aligned
