name = "bgdisplay-worker"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "BGDISPLAY_CONFIG"
id = "c86909e122f0453a978dda571eebac25"

[[kv_namespaces]]
binding = "BGDISPLAY_AUTH"
id = "1e7f3aa136174b6eacdbd78bd4ce7a45"

[vars]
WORKER_VERSION = "3.0.0"

# Feature 1: Durable Object WebSocket relay for instant config push
[[durable_objects.bindings]]
name = "CONFIG_SYNC"
class_name = "ConfigSyncRelay"

[[migrations]]
tag = "v1"
new_classes = ["ConfigSyncRelay"]

# Feature 2: Workers AI binding for daily digest generation
[ai]
binding = "AI"

# Cron triggers:
#   Feature 2 — daily digest at 7:45 AM CST (1:45 PM UTC) and 7:45 AM CDT (12:45 PM UTC)
#   Feature 3 — hourly summaries 8 AM-11 PM (1-5 PM UTC for CDT, 2-5 AM+1 UTC for CST, plus midnight-5 AM wrap)
#   Feature 4 — Pushover BG alert check every 5 minutes
[triggers]
crons = ["45 12,13 * * *", "0 14-23 * * *", "0 0-5 * * *", "*/5 * * * *"]
