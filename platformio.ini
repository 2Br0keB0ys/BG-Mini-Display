[platformio]
default_envs = m5stack-core2
; Keep firmware sources in their existing location while allowing
; PlatformIO to treat workspace root as the project.
src_dir = firmware/bgdisplay/src
include_dir = firmware/bgdisplay/src
build_dir = firmware/bgdisplay/.pio/build
libdeps_dir = firmware/bgdisplay/.pio/libdeps

[env:m5stack-core2]
platform  = espressif32
board     = m5stack-core2
framework = arduino

board_build.mcu        = esp32
board_build.f_cpu      = 240000000L
board_build.f_flash    = 80000000L
board_build.flash_mode = dio

lib_deps =
	m5stack/M5Unified @ ^0.2.4
	bblanchon/ArduinoJson @ ^6.21.5
	links2004/WebSockets @ ^2.4.1

monitor_speed = 115200

build_flags =
	-O2
	-DCORE_DEBUG_LEVEL=0
	-DARDUINO_LOOP_STACK_SIZE=16384
	-Wall
	-Wextra
	-Wno-unused-parameter

upload_speed = 1500000
